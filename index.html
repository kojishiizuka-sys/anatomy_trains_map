<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Trains Map</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #2b6cb0;
            --accent-light: #ebf8ff;
            --border-color: #e2e8f0;
            --highlight-color: #e53e3e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 20px; color: var(--accent-color); }

        .search-box { margin-bottom: 25px; }

        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus { border-color: var(--accent-color); }

        .result-section { margin-top: 20px; }

        .line-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #fff;
        }

        .line-name {
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-size: 1rem;
            border-bottom: 2px solid var(--accent-light);
            padding-bottom: 5px;
        }

        .station {
            position: relative;
            padding-left: 25px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .station::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px var(--border-color);
            z-index: 2;
        }

        .station::after {
            content: '';
            position: absolute;
            left: 9px;
            top: 16px;
            width: 2px;
            height: calc(100% + 2px);
            background-color: var(--border-color);
            z-index: 1;
        }

        .station:last-child::after { display: none; }

        .station.highlight { font-weight: bold; color: var(--highlight-color); }

        .station.highlight::before {
            background-color: var(--highlight-color);
            box-shadow: 0 0 0 2px var(--highlight-color);
        }

        .no-result { text-align: center; color: #718096; font-size: 0.95rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Anatomy Trains Map</h1>
    
    <div class="search-box">
        <label for="muscle-select">痛みのある筋肉を選択:</label>
        <select id="muscle-select">
            <option value="">-- 筋肉を選択してください --</option>
        </select>
    </div>

    <div id="results" class="result-section">
        <div class="no-result">筋肉を選択すると、つながりのあるラインと筋肉が路線図風に表示されます。</div>
    </div>
</div>

<script>
const anatomyTrainsData = [
  {
    lineId: "sbl",
    lineName: "スーパーフィシャル・バック・ライン (SBL)",
    stations: ["帽状腱膜", "後頭下筋群", "脊柱起立筋", "仙結節靭帯", "ハムストリングス", "腓腹筋", "足底腱膜"]
  },
  {
    lineId: "sfl",
    lineName: "スーパーフィシャル・フロント・ライン (SFL)",
    stations: ["頭皮筋膜", "胸鎖乳突筋", "胸骨筋", "腹直筋", "大腿直筋", "前脛骨筋", "短趾伸筋"]
  },
  {
    lineId: "ll",
    lineName: "ラテラル・ライン (LL)",
    stations: ["頭板状筋", "頸板状筋", "胸鎖乳突筋", "斜角筋", "肋間筋", "外腹斜筋", "内腹斜筋", "大殿筋", "中殿筋", "大腿筋膜張筋", "腸脛靭帯", "長腓骨筋", "短腓骨筋"]
  },
  {
    lineId: "spl",
    lineName: "スパイラル・ライン (SPL)",
    stations: ["頭板状筋", "菱形筋", "前鋸筋", "外腹斜筋", "内腹斜筋", "大腿筋膜張筋", "腸脛靭帯", "前脛骨筋", "長腓骨筋", "大腿二頭筋", "仙結節靭帯", "腰背筋膜", "脊柱起立筋"]
  },
  {
    lineId: "ffl",
    lineName: "フロント・ファンクショナル・ライン (FFL)",
    stations: ["大胸筋", "腹直筋", "内転筋群"]
  },
  {
    lineId: "bfl",
    lineName: "バック・ファンクショナル・ライン (BFL)",
    stations: ["広背筋", "腰背筋膜", "大殿筋", "外側広筋"]
  },
  {
    lineId: "dbal",
    lineName: "ディープ・バック・アーム・ライン (DBAL)",
    stations: ["肩甲挙筋", "菱形筋", "回旋筋腱板", "上腕三頭筋", "尺側手根伸筋", "小指球筋"]
  },
  {
    lineId: "sbal",
    lineName: "スーパーフィシャル・バック・アーム・ライン (SBAL)",
    stations: ["僧帽筋", "三角筋", "外側上腕筋間中隔", "前腕伸筋群"]
  },
  {
    lineId: "dfal",
    lineName: "ディープ・フロント・アーム・ライン (DFAL)",
    stations: ["小胸筋", "鎖骨下筋", "上腕二頭筋", "橈骨骨膜", "橈側手根屈筋", "母指球筋"]
  },
  {
    lineId: "sfal",
    lineName: "スーパーフィシャル・フロント・アーム・ライン (SFAL)",
    stations: ["大胸筋", "広背筋", "内側上腕筋間中隔", "前腕屈筋群"]
  },
  {
    lineId: "dfl",
    lineName: "ディープ・フロント・ライン (DFL)",
    stations: ["頭長筋", "頭直筋", "舌骨下筋群", "斜角筋", "心膜", "横隔膜", "腸腰筋", "骨盤底筋群", "内転筋群", "膝窩筋", "後脛骨筋", "長趾屈筋"]
  }
];

const selectEl = document.getElementById('muscle-select');
const allMuscles = new Set();
anatomyTrainsData.forEach(line => line.stations.forEach(m => allMuscles.add(m)));

Array.from(allMuscles).sort().forEach(muscle => {
    const option = document.createElement('option');
    option.value = muscle;
    option.textContent = muscle;
    selectEl.appendChild(option);
});

selectEl.addEventListener('change', (e) => {
    const selectedMuscle = e.target.value;
    const resultsContainer = document.getElementById('results');
    resultsContainer.innerHTML = '';

    if (!selectedMuscle) {
        resultsContainer.innerHTML = '<div class="no-result">筋肉を選択すると、つながりのあるラインと筋肉が路線図風に表示されます。</div>';
        return;
    }

    anatomyTrainsData.forEach(line => {
        if (line.stations.includes(selectedMuscle)) {
            const card = document.createElement('div');
            card.className = 'line-card';
            const lineNameDiv = document.createElement('div');
            lineNameDiv.className = 'line-name';
            lineNameDiv.textContent = line.lineName;
            card.appendChild(lineNameDiv);

            line.stations.forEach(station => {
                const stationDiv = document.createElement('div');
                stationDiv.className = 'station' + (station === selectedMuscle ? ' highlight' : '');
                stationDiv.textContent = station;
                card.appendChild(stationDiv);
            });
            resultsContainer.appendChild(card);
        }
    });
});
</script>
</body>
</html>
