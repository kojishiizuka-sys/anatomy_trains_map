<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomy Trains Map</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent-color: #2b6cb0;
            --accent-light: #ebf8ff;
            --border-color: #e2e8f0;
            --highlight-color: #e53e3e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .search-box {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        .result-section {
            margin-top: 20px;
        }

        .line-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #fff;
        }

        .line-name {
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-size: 1rem;
            border-bottom: 2px solid var(--accent-light);
            padding-bottom: 5px;
        }

        .route-map {
            display: block;
        }

        .station {
            position: relative;
            padding-left: 25px;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        /* 路線図の縦線とドットをCSSで表現 */
        .station::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--border-color);
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px var(--border-color);
            z-index: 2;
        }

        .station::after {
            content: '';
            position: absolute;
            left: 9px;
            top: 16px;
            width: 2px;
            height: calc(100% + 2px);
            background-color: var(--border-color);
            z-index: 1;
        }

        .station:last-child::after {
            display: none;
        }

        /* 選択された筋肉（現在地）のハイライト */
        .station.highlight {
            font-weight: bold;
            color: var(--highlight-color);
        }

        .station.highlight::before {
            background-color: var(--highlight-color);
            box-shadow: 0 0 0 2px var(--highlight-color);
        }

        .no-result {
            text-align: center;
            color: #718096;
            font-size: 0.95rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Anatomy Trains Map</h1>
    
    <div class="search-box">
        <label for="muscle-select">トラブルや痛みのある筋肉（筋A）を選択:</label>
        <select id="muscle-select">
            <option value="">-- 筋肉を選択してください --</option>
        </select>
    </div>

    <div id="results" class="result-section">
        <div class="no-result">筋肉を選択すると、つながりのあるラインと筋肉が路線図風に表示されます。</div>
    </div>
</div>

<script>
// アナトミートレインの主要データ
const anatomyTrainsData = [
  {
    lineId: "sbl",
    lineName: "スーパーフィシャル・バック・ライン (SBL / 体の背面)",
    stations: ["足底腱膜", "短趾屈筋", "腓腹筋", "アキレス腱", "ハムストリングス", "仙結節靭帯", "腰背筋膜", "脊柱起立筋", "頭板状筋", "帽状腱膜"]
  },
  {
    lineId: "sfl",
    lineName: "スーパーフィシャル・フロント・ライン (SFL / 体の前面)",
    stations: ["短趾伸筋", "長趾伸筋", "前脛骨筋", "大腿四頭筋", "腹直筋", "胸骨筋", "胸鎖乳突筋", "頭頭筋膜"]
  },
  {
    lineId: "ll",
    lineName: "ラテラル・ライン (LL / 体の側部)",
    stations: ["腓骨筋", "前脛骨筋靭帯", "大腿筋膜張筋", "大殿筋（上部）", "腸脛靭帯", "中殿筋", "外腹斜筋", "肋間筋", "頭板状筋", "胸鎖乳突筋"]
  },
  {
    lineId: "spl",
    lineName: "スパイラル・ライン (SPL / 体をらせん状に巻く)",
    stations: ["頭板状筋", "菱形筋", "前鋸筋", "外腹斜筋", "内腹斜筋", "大腿筋膜張筋", "腸脛靭帯", "前脛骨筋", "長腓骨筋", "大腿二頭筋", "仙結節靭帯", "腰背筋膜", "脊柱起立筋"]
  },
  {
    lineId: "dbal",
    lineName: "ディープ・バック・アーム・ライン (DBAL / 腕の深層背面)",
    stations: ["肩甲挙筋", "菱形筋", "回旋筋腱板（ローテーターカフ）", "上腕三頭筋", "尺骨骨膜", "尺側手根伸筋", "小指球筋"]
  },
  {
    lineId: "sbal",
    lineName: "スーパーフィシャル・バック・アーム・ライン (SBAL / 腕の浅層背面)",
    stations: ["僧帽筋", "三角筋", "外側上腕筋間中隔", "伸筋群（前腕伸筋群）", "指伸筋"]
  },
  {
    lineId: "dfal",
    lineName: "ディープ・フロント・アーム・ライン (DFAL / 腕の深層前面)",
    stations: ["小胸筋", "鎖骨下筋", "上腕二頭筋", "橈骨骨膜", "橈側手根屈筋", "母指球筋"]
  },
  {
    lineId: "sfal",
    lineName: "スーパーフィシャル・フロント・アーム・ライン (SFAL / 腕の浅層前面)",
    stations: ["大胸筋", "広背筋", "内側上腕筋間中隔", "屈筋群（前腕屈筋群）", "手根管"]
  },
  {
    lineId: "dfl",
    lineName: "ディープ・フロント・ライン (DFL / 体の深層・中心軸)",
    stations: ["後脛骨筋", "長趾屈筋", "膝窩筋", "内転筋群", "骨盤底筋群", "腸腰筋", "横隔膜", "心膜", "縦隔", "斜角筋", "舌骨下筋群", "頭長筋", "頭直筋"]
  }
];

// 重複のない全筋肉のリストを自動抽出し、50音順にソートしてセレクトボックスに登録
const selectEl = document.getElementById('muscle-select');
const allMuscles = new Set();
anatomyTrainsData.forEach(line => line.stations.forEach(m => allMuscles.add(m)));

Array.from(allMuscles).sort().forEach(muscle => {
    const option = document.createElement('option');
    option.value = muscle;
    option.textContent = muscle;
    selectEl.appendChild(option);
});

// セレクトボックス変更時の描画イベント
selectEl.addEventListener('change', (e) => {
    const selectedMuscle = e.target.value;
    const resultsContainer = document.getElementById('results');
    resultsContainer.innerHTML = '';

    if (!selectedMuscle) {
        resultsContainer.innerHTML = '<div class="no-result">筋肉を選択すると、つながりのあるラインと筋肉が路線図風に表示されます。</div>';
        return;
    }

    anatomyTrainsData.forEach(line => {
        if (line.stations.includes(selectedMuscle)) {
            const card = document.createElement('div');
            card.className = 'line-card';

            const lineNameDiv = document.createElement('div');
            lineNameDiv.className = 'line-name';
            lineNameDiv.textContent = line.lineName;
            card.appendChild(lineNameDiv);

            const routeMapDiv = document.createElement('div');
            routeMapDiv.className = 'route-map';

            line.stations.forEach(station => {
                const stationDiv = document.createElement('div');
                stationDiv.className = 'station';
                if (station === selectedMuscle) {
                    stationDiv.className += ' highlight';
                }
                stationDiv.textContent = station;
                routeMapDiv.appendChild(stationDiv);
            });

            card.appendChild(routeMapDiv);
            resultsContainer.appendChild(card);
        }
    });
});
</script>
</body>
</html>
